<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.14"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <filter id="lightShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="paperTint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbfbf8"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L9 5 L1 9 Z" fill="#111827"/>
    </marker>
    <style>
      .system {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }
      .song {
        font-family: "Songti SC", "STSong", "Noto Serif CJK SC", "SimSun", serif;
      }
      .mono {
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
      }
    </style>
  </defs>

  <rect width="1080" height="1440" fill="#f7f7f4"/>
  <rect x="0" y="0" width="1080" height="1440" fill="#ffffff" opacity="0.38"/>

  <g class="system" text-anchor="middle">
    <text x="540" y="116" font-size="23" font-weight="600" fill="#6b7280" letter-spacing="3">ZUFE-Thesis-Skill</text>
    <text x="540" y="248" font-size="62" font-weight="700" fill="#111827" letter-spacing="0">让 LaTeX 的好处先发生</text>
    <text x="540" y="324" font-size="28" font-weight="400" fill="#4b5563">从 Word 初稿自动生成规范格式的 PDF</text>
    <text x="540" y="366" font-size="28" font-weight="400" fill="#4b5563">不把时间浪费在反复调格式上</text>
  </g>

  <g transform="translate(82 436) rotate(-2.2 220 310)" filter="url(#softShadow)">
    <rect x="0" y="0" width="440" height="619" rx="6" fill="#ffffff"/>
    <image href="word.png" x="0" y="0" width="440" height="619" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g class="system" text-anchor="middle">
    <text x="302" y="1110" font-size="24" font-weight="650" fill="#111827">Word 初稿</text>
    <text x="302" y="1146" font-size="18" fill="#6b7280">拥有大量格式错误</text>
  </g>

  <g transform="translate(558 434) rotate(1.8 220 312)" filter="url(#softShadow)">
    <rect x="0" y="0" width="440" height="623" rx="6" fill="#ffffff"/>
    <image href="pdf.png" x="0" y="0" width="440" height="623" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g class="system" text-anchor="middle">
    <text x="778" y="1110" font-size="24" font-weight="650" fill="#111827">规范 PDF</text>
    <text x="778" y="1146" font-size="18" fill="#6b7280">格式正确，清晰规整</text>
  </g>

  <g class="system" text-anchor="middle">
    <path d="M490 744 C514 724 548 724 590 744" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <rect x="445" y="774" width="190" height="78" rx="32" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2" filter="url(#lightShadow)"/>
    <text x="540" y="807" font-size="22" font-weight="700" fill="#111827">Agent + Skill</text>
    <text x="540" y="834" font-size="16" font-weight="600" fill="#111827">自动转换</text>
  </g>

  <g class="system" text-anchor="middle">
    <text x="540" y="1248" font-size="32" font-weight="700" fill="#111827">把排版交给 LaTeX，把判断交给 Agent</text>
    <text x="540" y="1298" font-size="24" fill="#4b5563">保留 Word 写作习惯，也获得 LaTeX 的规范结果</text>
  </g>

  <g class="system" text-anchor="middle">
    <text x="540" y="1370" font-size="18" fill="#9ca3af">github.com/SeraphinaGlacia/ZUFE-Thesis-Skill</text>
  </g>
</svg>
